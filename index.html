<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROBLOX 2013 Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #84C1FF; font-family: 'Arial', sans-serif; }
        
        /* Classic 2013 Topbar */
        #topbar {
            position: absolute; top: 0; width: 100%; height: 40px;
            background: rgba(0, 0, 0, 0.7); display: flex; align-items: center;
            padding: 0 20px; color: white; font-weight: bold; z-index: 10;
        }

        #ui-overlay {
            position: absolute; bottom: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 0px #000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="topbar">
        <span style="color: #ff0000;">ROBLOX</span> 
        <span style="margin-left: 20px; font-size: 12px; color: #ccc;">v2013.Simulation</span>
    </div>

    <div id="ui-overlay">
        <h2>Place: The Void</h2>
        <p>WASD to Move | Space to Jump</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x84C1FF); // Classic Sky Blue
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Low AA for that 2013 look
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING (The "Bright" Legacy Look) ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x606060));

        // --- THE BASEPLATE ---
        // Creating the "Studs" texture using a Canvas
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#212121'; // Dark Grey
        ctx.fillRect(0, 0, 64, 64);
        ctx.strokeStyle = '#333';
        ctx.beginPath(); ctx.arc(32, 32, 15, 0, Math.PI * 2); ctx.stroke(); // The Stud circle
        
        const studTexture = new THREE.CanvasTexture(canvas);
        studTexture.wrapS = studTexture.wrapT = THREE.RepeatWrapping;
        studTexture.repeat.set(50, 50);

        const groundGeo = new THREE.BoxGeometry(500, 2, 500);
        const groundMat = new THREE.MeshStandardMaterial({ map: studTexture, color: 0x333333 });
        const baseplate = new THREE.Mesh(groundGeo, groundMat);
        baseplate.position.y = -1;
        scene.add(baseplate);

        // --- THE CHARACTER (The classic "Noob") ---
        const charGroup = new THREE.Group();
        
        const createPart = (w, h, d, color, y) => {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshStandardMaterial({ color: color })
            );
            mesh.position.y = y;
            charGroup.add(mesh);
        };

        createPart(2, 2, 2, 0xFFFF00, 4);   // Head
        createPart(4, 4, 2, 0x0000FF, 1);   // Torso (Blue)
        createPart(1.5, 4, 1.5, 0xFFFF00, 1); // Left Arm
        createPart(1.5, 4, 1.5, 0xFFFF00, 1); // Right Arm (Offset them in real logic)
        createPart(1.8, 4, 1.8, 0x00FF00, -3); // Legs (Green)
        
        charGroup.children[2].position.x = -2.8;
        charGroup.children[3].position.x = 2.8;
        charGroup.children[4].position.x = -1.1;
        const rightLeg = charGroup.children[4].clone();
        rightLeg.position.x = 1.1;
        charGroup.add(rightLeg);

        scene.add(charGroup);

        // --- MOVEMENT ---
        const keys = {};
        let moveSpeed = 0.5;
        let yVelocity = 0;
        let isJumping = false;

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);

            // Simple WASD
            if (keys['KeyW']) charGroup.position.z -= moveSpeed;
            if (keys['KeyS']) charGroup.position.z += moveSpeed;
            if (keys['KeyA']) charGroup.position.x -= moveSpeed;
            if (keys['KeyD']) charGroup.position.x += moveSpeed;

            // Simple Gravity/Jump
            if (keys['Space'] && !isJumping) {
                yVelocity = 0.5;
                isJumping = true;
            }

            charGroup.position.y += yVelocity;
            if (charGroup.position.y > 4) {
                yVelocity -= 0.02; // Gravity
            } else {
                charGroup.position.y = 4;
                yVelocity = 0;
                isJumping = false;
            }

            // Camera follow
            camera.position.x = charGroup.position.x;
            camera.position.z = charGroup.position.z + 30;
            camera.lookAt(charGroup.position);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
