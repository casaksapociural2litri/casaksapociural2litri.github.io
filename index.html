<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Button Spawner</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 20px; }
        #container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        button { 
            background: #8b5cf6; color: white; border: none; padding: 10px 15px; 
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #7c3aed; }
        .stats { font-size: 1.2rem; margin-bottom: 10px; color: #22d3ee; }
    </style>
</head>
<body>

    <h1>Prime Spawner</h1>
    <div class="stats">Current Prime: <span id="prime-display">2</span></div>
    <p>Click any button to reach the next prime number!</p>

    <div id="container">
        <button onclick="spawnToNextPrime()">Click Me</button>
        <button onclick="spawnToNextPrime()">Click Me</button>
    </div>

    <script>
        let currentPrime = 2;

        // Function to check if a number is prime
        function isPrime(num) {
            for (let i = 2, s = Math.sqrt(num); i <= s; i++) {
                if (num % i === 0) return false;
            }
            return num > 1;
        }

        // Function to find the next prime
        function getNextPrime(n) {
            let next = n + 1;
            while (!isPrime(next)) {
                next++;
            }
            return next;
        }

        function spawnToNextPrime() {
            const container = document.getElementById('container');
            const nextPrime = getNextPrime(currentPrime);
            
            // Calculate how many NEW buttons we need
            const diff = nextPrime - currentPrime;

            for (let i = 0; i < diff; i++) {
                const btn = document.createElement('button');
                btn.innerHTML = "Click Me";
                btn.onclick = spawnToNextPrime;
                container.appendChild(btn);
            }

            // Update the global tracker and the UI
            currentPrime = nextPrime;
            document.getElementById('prime-display').innerText = currentPrime;
        }
    </script>
</body>
</html>
