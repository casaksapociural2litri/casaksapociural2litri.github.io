<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>čašekOS</title>
    <style>
        :root {
            --bg-color: #000;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            background: #000;
        }

        /* The Phone Frame */
        #phone {
            width: 100vw; height: 100vh;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover;
            position: relative;
            transition: filter 0.5s;
        }

        /* --- DYNAMIC ISLAND --- */
        #dynamic-island {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 35px;
            background: #000;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 12px; overflow: hidden;
            cursor: pointer;
        }

        #dynamic-island.expanded {
            width: 350px; height: 80px;
            border-radius: 35px;
        }

        /* --- HOME SCREEN GRID --- */
        #home-screen {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            padding: 80px 30px;
            display: none;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: white; font-size: 12px; cursor: pointer;
        }

        .icon-box {
            width: 60px; height: 60px;
            border-radius: 15px;
            background: linear-gradient(145deg, #1e1e1e, #111);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        /* --- LOCK SCREEN --- */
        #lock-screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; padding-top: 120px;
            color: white; z-index: 50;
            backdrop-filter: blur(10px);
        }

        .time { font-size: 80px; font-weight: 200; }
        .date { font-size: 20px; margin-top: -10px; }

        /* --- NAVIGATION BAR --- */
        #nav-bar {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            width: 130px; height: 5px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px; cursor: pointer;
        }

        /* --- APPS WINDOW --- */
        .app-window {
            position: absolute; inset: 0;
            background: white; z-index: 100;
            display: none; transform: translateY(100%);
            transition: transform 0.4s ease-in-out;
            padding: 40px 20px; border-radius: 30px 30px 0 0;
        }

        .app-window.active { display: block; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="phone">
        <div id="dynamic-island" onclick="toggleIsland()">
            <span id="island-content"></span>
        </div>

        <div id="lock-screen" onclick="unlock()">
            <div class="time" id="clock">12:00</div>
            <div class="date">Sunday, March 22</div>
            <p style="margin-top: auto; margin-bottom: 50px; opacity: 0.6;">Tap to unlock čašekOS</p>
        </div>

        <div id="home-screen">
            <div class="app-icon" onclick="openApp('notes')">
                <div class="icon-box" style="background: #ffcc00;">📝</div>
                <span>Notes</span>
            </div>
            <div class="app-icon" onclick="notifyIsland('Charging... 88%')">
                <div class="icon-box" style="background: #4cd964;">⚡</div>
                <span>Battery</span>
            </div>
            <div class="app-icon" onclick="openApp('music')">
                <div class="icon-box" style="background: #ff2d55;">🎵</div>
                <span>Music</span>
            </div>
            <div class="app-icon" onclick="location.reload()">
                <div class="icon-box" style="background: #5856d6;">🔄</div>
                <span>Reset</span>
            </div>
        </div>

        <div id="notes" class="app-window">
            <h1>Notes</h1>
            <textarea style="width: 100%; height: 200px; border: none; font-size: 18px;" placeholder="Write something..."></textarea>
        </div>

        <div id="nav-bar" onclick="goHome()"></div>
    </div>

    <script>
        // Update Clock
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // OS Logic
        function unlock() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'grid';
            notifyIsland("Welcome to čašekOS");
        }

        function goHome() {
            document.querySelectorAll('.app-window').forEach(app => {
                app.classList.remove('active');
            });
            notifyIsland("čašekOS Home");
        }

        function openApp(id) {
            document.getElementById(id).classList.add('active');
            notifyIsland(`Opening ${id}...`);
        }

        // Dynamic Island Logic
        let islandTimeout;
        function notifyIsland(text) {
            const island = document.getElementById('dynamic-island');
            const content = document.getElementById('island-content');
            
            clearTimeout(islandTimeout);
            island.classList.add('expanded');
            content.innerText = text;

            islandTimeout = setTimeout(() => {
                island.classList.remove('expanded');
                setTimeout(() => content.innerText = "", 400);
            }, 3000);
        }

        function toggleIsland() {
            const island = document.getElementById('dynamic-island');
            island.classList.toggle('expanded');
        }
    </script>
</body>
</html>
