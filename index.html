<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Irrational Slicer</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #121212; color: #ff00ff; text-align: center; padding: 20px; }
        #container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
        
        /* The standard button style */
        button { 
            background: #222; color: #ff00ff; border: 2px solid #ff00ff; 
            padding: 10px; border-radius: 4px; cursor: pointer;
            flex-shrink: 0; white-space: nowrap; overflow: hidden;
        }

        /* This class handles the "Cut" button */
        .fragment {
            border-right: none; /* Hide the right border to look "cut" */
            opacity: 0.7;
            background: linear-gradient(90deg, #440044, #222);
        }

        .stats { font-size: 1.2rem; margin-bottom: 20px; color: #00ffff; }
    </style>
</head>
<body>

    <h1>Irrational Slicer</h1>
    <div class="stats">
        Target Value (&radic;<span id="n-val">2</span>): <br>
        <strong id="irrational-val">1.41421356...</strong>
    </div>

    <div id="container">
        <button onclick="nextIrrational()">Click to Advance</button>
    </div>

    <script>
        let n = 2;

        function isPerfectSquare(x) {
            let s = Math.sqrt(x);
            return (s % 1 === 0);
        }

        function nextIrrational() {
            n++;
            while(isPerfectSquare(n)) { n++; }

            const val = Math.sqrt(n);
            const container = document.getElementById('container');
            container.innerHTML = ""; // Clear to redraw accurately

            // 1. Get the whole number part (e.g., 3)
            const wholePart = Math.floor(val);
            // 2. Get the decimal part (e.g., 0.14)
            const decimalPart = val - wholePart;

            // Create the full buttons
            for (let i = 0; i < wholePart; i++) {
                const btn = document.createElement('button');
                btn.innerHTML = "FULL";
                btn.onclick = nextIrrational;
                container.appendChild(btn);
            }

            // Create the "Cut" button (the irrational fragment)
            if (decimalPart > 0) {
                const frag = document.createElement('button');
                frag.className = "fragment";
                frag.innerHTML = "PART";
                frag.onclick = nextIrrational;
                
                // We use CSS width to "cut" the button
                // We'll give it a base width of 100px and multiply by the decimal
                frag.style.width = (decimalPart * 100) + "px";
                container.appendChild(frag);
            }

            // Update UI
            document.getElementById('n-val').innerText = n;
            document.getElementById('irrational-val').innerText = val.toFixed(10) + "...";
        }
    </script>
</body>
</html>
