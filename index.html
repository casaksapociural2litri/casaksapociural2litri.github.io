<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bouncing and Expanding Cube</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; }
        #stats { font-size: 1rem; margin-top: 10px; }
        .stat-value { color: #00ffaa; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>EXPANDING CUBE SIMULATION</h1>
        <div id="stats">
            Bounces: <span id="bounceCount" class="stat-value">0</span> | 
            Vertices: <span id="vertCount" class="stat-value">8</span> | 
            Cube Radius: <span id="cubeRadius" class="stat-value">0.50</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONSTANTS AND SETTINGS ---
        const SPHERE_RADIUS = 5;
        const INITIAL_CUBE_RADIUS = 0.5;
        const SIZE_INCREASE_PER_BOUNCE = 1.05; // 5% increase
        const INITIAL_SPEED = 0.1;

        // --- SCENE, CAMERA, RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ORBIT CONTROLS (Manual or Auto-Orbit) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true; // This handles the requested "orbiting camera"
        controls.autoRotateSpeed = 1.0;
        controls.minDistance = 6;
        controls.maxDistance = 25;

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7).normalize();
        scene.add(directionalLight);

        // --- THE CONTAINING SPHERE ---
        // Wireframe shows the boundary clearly
        const sphereGeo = new THREE.SphereGeometry(SPHERE_RADIUS, 32, 32);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.3 });
        const sphereContainer = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphereContainer);

        // --- THE BOUNCING CUBE ---
        // 'BoxGeometry' is simple. To add faces visually, we can increase the 'segments'.
        let currentCubeSegments = 1; 
        const cubeMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffaa, emissive: 0x002200, shininess: 30, flatShading: false });
        
        let cubeGeometry = new THREE.BoxGeometry(INITIAL_CUBE_RADIUS * 2, INITIAL_CUBE_RADIUS * 2, INITIAL_CUBE_RADIUS * 2, currentCubeSegments, currentCubeSegments, currentCubeSegments);
        const bouncingCube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        scene.add(bouncingCube);

        // --- PHYSICS STATE ---
        const velocity = new THREE.Vector3(
            (Math.random() - 0.5) * INITIAL_SPEED * 2,
            (Math.random() - 0.5) * INITIAL_SPEED * 2,
            (Math.random() - 0.5) * INITIAL_SPEED * 2
        );
        let bounceCount = 0;
        let currentCubeRadius = INITIAL_CUBE_RADIUS;

        // UI update function
        function updateUI() {
            document.getElementById('bounceCount').innerText = bounceCount;
            document.getElementById('vertCount').innerText = bouncingCube.geometry.attributes.position.count;
            document.getElementById('cubeRadius').innerText = currentCubeRadius.toFixed(2);
        }

        // Handle Cube expansion and Geometry update
        function expandCube() {
            // Increase visual faces by increasing segments
            currentCubeSegments++; 
            
            // Increase the base size
            currentCubeRadius *= SIZE_INCREASE_PER_BOUNCE;
            
            // Re-generate geometry. Three.js is not efficient at modifying existing geometries drastically, 
            // so we generate a new 'BoxGeometry' with more segments and update the mesh.
            bouncingCube.geometry.dispose(); // Crucial: Free the old geometry from memory
            
            const newSize = currentCubeRadius * 2;
            bouncingCube.geometry = new THREE.BoxGeometry(
                newSize, newSize, newSize, 
                currentCubeSegments, currentCubeSegments, currentCubeSegments
            );
        }

        // Collision detection and response
        function checkCollision() {
            const cubePos = bouncingCube.position;
            const distance = cubePos.distanceTo(sphereContainer.position);

            // The effective limit is the sphere's inner radius minus the cube's "radius"
            // (Using the side length is safer than the diagonal for a cube collision)
            const collisionThreshold = SPHERE_RADIUS - currentCubeRadius;

            if (distance > collisionThreshold) {
                // Determine the normal vector of the collision point (the direction from center to cube)
                const normal = cubePos.clone().normalize();
                
                // Reflect velocity across this normal: R = V - 2(V·N)N
                velocity.reflect(normal);
                
                // Keep speed constant (can be changed later)
                // (Velocity reflection handles the change in direction automatically)

                // Physics Hack: Slightly move the cube back inside to prevent getting "stuck" in the boundary
                const correction = normal.clone().multiplyScalar(0.01);
                bouncingCube.position.sub(correction);

                // Handle visual effects (more faces and bigger)
                bounceCount++;
                expandCube();
                updateUI();
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Update Physics
            bouncingCube.position.add(velocity);
            checkCollision();

            // Handle Camera Orbit (managed automatically by controls.autoRotate)
            controls.update();

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
