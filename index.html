<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Doubler</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            color: white;
            text-align: center; 
            padding: 40px; 
        }
        button { 
            margin: 5px; 
            padding: 12px 18px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px;
            cursor: pointer; 
            transition: transform 0.1s;
        }
        button:hover { background-color: #0056b3; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #stats { font-size: 1.5rem; margin-bottom: 20px; color: #00ffcc; }
    </style>
</head>
<body>

    <h1>The Button Doubler</h1>
    <div id="stats">Total Buttons: <span id="count">1</span></div>
    
    <div id="container">
        <button onclick="doubleButtons()">Click to Double!</button>
    </div>

    <script>
        function doubleButtons() {
            const container = document.getElementById('container');
            
            // 1. See how many buttons are currently on the screen
            const currentButtons = container.querySelectorAll('button');
            const amountToAdd = currentButtons.length;

            // 2. Loop that many times to create the clones
            for (let i = 0; i < amountToAdd; i++) {
                const newBtn = document.createElement('button');
                newBtn.innerHTML = "Click to Double!";
                newBtn.onclick = doubleButtons;
                container.appendChild(newBtn);
            }

            // 3. Update the counter at the top
            document.getElementById('count').innerText = container.querySelectorAll('button').length;
        }
    </script>

</body>
</html>
