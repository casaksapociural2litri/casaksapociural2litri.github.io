<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pi Button Multiplier</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #pi-bar { 
            padding: 15px; background: #fff; border: 1px solid #ddd; 
            min-height: 30px; margin-bottom: 20px; word-break: break-all;
            font-family: monospace; font-size: 1.2rem;
        }
        .zero-container { display: inline-block; text-align: center; position: relative; }
        .one-above { font-size: 0.6rem; display: block; line-height: 1; color: red; }
        #button-container { display: flex; flex-wrap: wrap; gap: 10px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .stats { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Pi Multiplier</h2>
    <div class="stats">Digits Clicked: <span id="count">0</span> | Total Buttons: <span id="btn-total">1</span></div>
    
    <div id="pi-bar">Pi sequence will appear here...</div>

    <div id="button-container">
        <button onclick="multiplyButtons()">Click Me</button>
    </div>

    <script>
        // A string of Pi digits (first 1000 for demo purposes)
        const piDigits = "31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679";
        let currentIndex = 0;

        function multiplyButtons() {
            if (currentIndex >= piDigits.length) {
                alert("You've reached the end of the pre-loaded Pi digits!");
                return;
            }

            const rawDigit = parseInt(piDigits[currentIndex]);
            const displayBar = document.getElementById('pi-bar');
            const container = document.getElementById('button-container');
            
            // 1. Update the Pi Bar
            if (currentIndex === 0) displayBar.innerHTML = ""; // Clear initial text
            
            if (rawDigit === 0) {
                displayBar.innerHTML += `<span class="zero-container"><span class="one-above">1</span>0</span>`;
            } else {
                displayBar.innerHTML += rawDigit;
            }

            // 2. Calculate Multiplier (replace 0 with 1)
            const multiplier = rawDigit === 0 ? 1 : rawDigit;
            const currentButtons = container.querySelectorAll('button').length;
            const targetCount = currentButtons * multiplier;

            // 3. Add the new buttons
            // Warning: This can grow VERY fast (exponentially)
            const buttonsToAdd = targetCount - currentButtons;
            for (let i = 0; i < buttonsToAdd; i++) {
                const btn = document.createElement('button');
                btn.innerText = "Click Me";
                btn.onclick = multiplyButtons;
                container.appendChild(btn);
            }

            currentIndex++;
            document.getElementById('count').innerText = currentIndex;
            document.getElementById('btn-total').innerText = container.querySelectorAll('button').length;
        }
    </script>
</body>
</html>
