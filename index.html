<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Browser Benchmark</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        #ui { padding: 40px; }
        .gauge { font-size: 3rem; margin: 20px; color: #fff; text-shadow: 0 0 10px #00ff00; }
        #results { display: none; background: #1a1a1a; padding: 20px; border: 2px solid #00ff00; width: 300px; margin: 0 auto; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        .score-val { color: #ff00ff; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
    <h1>SYSTEM BENCHMARK v1.0</h1>
    <p>Testing CPU math, DOM injection, and WebGL fragments...</p>
    
    <div class="gauge" id="timer">0.00s</div>
    
    <button id="start-btn" onclick="runBenchmark()">START TEST</button>

    <div id="results">
        <h2>TEST COMPLETE</h2>
        <p>Math Score: <span id="math-score" class="score-val">0</span></p>
        <p>DOM Score: <span id="dom-score" class="score-val">0</span></p>
        <p>GPU Score: <span id="gpu-score" class="score-val">0</span></p>
        <hr>
        <h3>TOTAL SCORE: <span id="total-score" style="color:yellow">0</span></h3>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    let mathCount = 0;
    let domCount = 0;
    let gpuFrames = 0;
    let isRunning = false;

    // --- GPU TEST SETUP (Three.js) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const geo = new THREE.TorusKnotGeometry(10, 3, 100, 16);
    const mat = new THREE.MeshNormalMaterial();
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    camera.position.z = 30;

    window.runBenchmark = async function() {
        if(isRunning) return;
        isRunning = true;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('results').style.display = 'none';
        
        mathCount = 0; domCount = 0; gpuFrames = 0;
        const startTime = performance.now();
        const duration = 5000; // 5 Second test

        // 1. MATH TEST (CPU)
        // Calculating prime numbers in a tight loop
        const mathTest = setInterval(() => {
            let num = Math.random() * 10000;
            Math.sqrt(num) * Math.sin(num) * Math.tan(num);
            mathCount++;
        }, 0);

        // 2. DOM TEST (Memory/UI)
        // Creating and deleting invisible elements
        const domTest = setInterval(() => {
            const div = document.createElement('div');
            document.body.appendChild(div);
            document.body.removeChild(div);
            domCount++;
        }, 0);

        // 3. GPU TEST (Loop)
        function renderGPU() {
            if(!isRunning) return;
            mesh.rotation.x += 0.1;
            mesh.rotation.y += 0.1;
            renderer.render(scene, camera);
            gpuFrames++;
            requestAnimationFrame(renderGPU);
        }
        renderGPU();

        // Timer Update
        const timerInterval = setInterval(() => {
            const elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('timer').innerText = elapsed.toFixed(2) + "s";
            if (elapsed >= 5) {
                stopBenchmark(timerInterval, mathTest, domTest);
            }
        }, 10);
    }

    function stopBenchmark(tI, mI, dI) {
        isRunning = false;
        clearInterval(tI);
        clearInterval(mI);
        clearInterval(dI);
        
        document.getElementById('start-btn').disabled = false;
        document.getElementById('results').style.display = 'block';

        // Final Score Calculation
        document.getElementById('math-score').innerText = (mathCount / 1000).toFixed(0);
        document.getElementById('dom-score').innerText = (domCount / 100).toFixed(0);
        document.getElementById('gpu-score').innerText = gpuFrames;
        
        const total = Math.floor((mathCount/1000) + (domCount/100) + gpuFrames);
        document.getElementById('total-score').innerText = total.toLocaleString();
    }
</script>

</body>
</html>
