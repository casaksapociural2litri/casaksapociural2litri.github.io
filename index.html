<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Planet Lander</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>PLANET EXPLORER</h1>
        <p>Altitude: <span id="alt">0</span> units</p>
    </div>
    
    <div id="controls">W/S: Move Forward/Back | A/D: Rotate | Mouse: Look</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Create the Planet (A huge sphere with "noise" texture)
        const geometry = new THREE.SphereGeometry(100, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x2244ff, 
            wireframe: true, // Wireframe makes it look like a "hologram" planet
            emissive: 0x112244
        });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);

        // 3. Add Lights
        const light = new THREE.PointLight(0xffffff, 500, 500);
        light.position.set(150, 150, 150);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 4. Movement Logic
        camera.position.z = 250;
        let speed = 0;
        let rotation = 0;
        const keys = {};

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateMovement() {
            if (keys['KeyW']) speed = -1;
            else if (keys['KeyS']) speed = 1;
            else speed *= 0.9; // Friction

            if (keys['KeyA']) rotation = 0.02;
            else if (keys['KeyD']) rotation = -0.02;
            else rotation *= 0.9;

            camera.rotateY(rotation);
            camera.translateZ(speed);

            // Calculate "Altitude"
            const dist = camera.position.distanceTo(planet.position) - 100;
            document.getElementById('alt').innerText = dist.toFixed(2);
        }

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
