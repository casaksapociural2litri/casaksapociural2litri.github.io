<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE MILLION BOXES</title>
    <style>
        body { background: #111; color: #0f0; font-family: sans-serif; text-align: center; }
        #controls { position: sticky; top: 0; background: #222; padding: 20px; border-bottom: 2px solid #0f0; z-index: 100; }
        #container { display: flex; flex-wrap: wrap; padding: 10px; justify-content: center; }
        
        /* Making them tiny so they don't take up 50 miles of page */
        input[type="checkbox"] { width: 12px; height: 12px; margin: 1px; accent-color: #0f0; cursor: crosshair; }
        
        .loading { color: yellow; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="controls">
        <h1>THE 1,000,000 CHECKBOX CHALLENGE</h1>
        <button id="spawn-btn" onclick="startSpawning()" style="padding: 10px 20px; font-size: 1.2rem; cursor: pointer;">
            SPAWN 1,000,000 BOXES
        </button>
        <div id="status">Status: Waiting...</div>
        <div id="loading-msg" class="loading">SIT TIGHT. BROWSERS HATE THIS...</div>
    </div>

    <div id="container"></div>

    <script>
        function startSpawning() {
            const container = document.getElementById('container');
            const status = document.getElementById('status');
            const loading = document.getElementById('loading-msg');
            const btn = document.getElementById('spawn-btn');

            btn.disabled = true;
            loading.style.display = 'block';
            status.innerText = "Status: Building DOM Tree...";

            // We use a Timeout so the UI has a chance to show the "Loading" message 
            // before the JavaScript "freezes" the main thread.
            setTimeout(() => {
                const fragment = document.createDocumentFragment();
                const total = 1000000;

                for (let i = 0; i < total; i++) {
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    fragment.appendChild(cb);
                    
                    // Optional: Periodic UI updates are impossible in a single loop 
                    // without async, so we just blast it all at once.
                }

                container.appendChild(fragment);
                
                loading.style.display = 'none';
                status.innerText = "Status: 1,000,000 BOXES RENDERED. GOOD LUCK.";
                console.log("1 Million checkboxes added to DOM.");
            }, 100);
        }
    </script>

</body>
</html>
